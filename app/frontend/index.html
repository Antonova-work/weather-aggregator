<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Самый честный прогноз погоды</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card {
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">
    <div class="container mx-auto px-4 py-8 max-w-4xl">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-slate-800 mb-4">Самый честный прогноз погоды</h1>
            <p class="text-slate-600">Прям честно-честно</p>
        </header>

        <div class="bg-white p-6 rounded-2xl shadow-sm mb-8 flex flex-col md:flex-row gap-4 items-center justify-center">
            <div class="w-full md:w-64">
                <label for="city-select" class="block text-sm font-medium text-slate-700 mb-1">Выберите город</label>
                <select id="city-select" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    <option value="55.75,37.62">Москва</option>
                    <option value="59.93,30.36">Санкт-Петербург</option>
                    <option value="55.03,82.92">Новосибирск</option>
                    <option value="43.11,131.87">Владивосток</option>
                    <option value="51.50,-0.12">Лондон</option>
                    <option value="40.71,-74.00">Нью-Йорк</option>
                </select>
            </div>
            <button id="get-weather-btn" class="mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition-colors duration-200 h-11">
                Получить погоду
            </button>
        </div>

        <div id="main-metrics" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 mb-12 hidden">
            <div class="card bg-white p-4 rounded-xl shadow-sm border-l-4 border-blue-500">
                <p class="text-sm text-slate-500 uppercase font-semibold">Температура</p>
                <p id="avg-temp" class="text-2xl font-bold text-slate-800">--</p>
            </div>
            <div class="card bg-white p-4 rounded-xl shadow-sm border-l-4 border-cyan-500">
                <p class="text-sm text-slate-500 uppercase font-semibold">Влажность</p>
                <p id="avg-humidity" class="text-2xl font-bold text-slate-800">--</p>
            </div>
            <div class="card bg-white p-4 rounded-xl shadow-sm border-l-4 border-indigo-500">
                <p class="text-sm text-slate-500 uppercase font-semibold">Ветер</p>
                <p id="avg-wind" class="text-2xl font-bold text-slate-800">--</p>
            </div>
            <div class="card bg-white p-4 rounded-xl shadow-sm border-l-4 border-purple-500">
                <p class="text-sm text-slate-500 uppercase font-semibold">Давление</p>
                <p id="avg-pressure" class="text-2xl font-bold text-slate-800">--</p>
            </div>
            <div class="card bg-white p-4 rounded-xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-sm text-slate-500 uppercase font-semibold">Облачность</p>
                <p id="avg-clouds" class="text-2xl font-bold text-slate-800">--</p>
            </div>
        </div>

        <div id="providers-section" class="hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6 text-center">Данные провайдеров</h2>
            <div id="providers-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                </div>

            <div class="text-center">
                <button id="download-json-btn" class="bg-slate-800 hover:bg-slate-900 text-white font-medium py-2 px-6 rounded-lg transition-colors duration-200 hidden">
                    Скачать JSON отчет
                </button>
            </div>
        </div>

        <div id="status-message" class="text-center text-slate-600 hidden">Загрузка данных...</div>
    </div>

    <script>
        const getBtn = document.getElementById('get-weather-btn');
        const downloadBtn = document.getElementById('download-json-btn');
        const citySelect = document.getElementById('city-select');
        const statusMsg = document.getElementById('status-message');
        const mainMetrics = document.getElementById('main-metrics');
        const providersSection = document.getElementById('providers-section');
        const providersGrid = document.getElementById('providers-grid');

        let lastData = null;

        async function fetchWeather() {
            const [lat, lon] = citySelect.value.split(',');
            const url = `http://127.0.0.1:8000/api/weather?lat=${lat}&lon=${lon}`;

            statusMsg.textContent = 'Загрузка данных...';
            statusMsg.classList.remove('hidden');
            mainMetrics.classList.add('hidden');
            providersSection.classList.add('hidden');
            downloadBtn.classList.add('hidden');

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('Ошибка сервера');
                const data = await response.json();
                lastData = data;
                displayWeather(data);
            } catch (error) {
                statusMsg.textContent = 'Ошибка: ' + error.message;
                statusMsg.classList.remove('hidden');
            }
        }

        function displayWeather(data) {
            // Обновляем общие метрики
            document.getElementById('avg-temp').textContent = `${data.average_temperature.toFixed(1)}°C`;
            document.getElementById('avg-humidity').textContent = `${data.average_humidity.toFixed(1)}%`;
            document.getElementById('avg-wind').textContent = `${data.average_wind_speed.toFixed(1)} м/с`;
            document.getElementById('avg-pressure').textContent = `${data.average_pressure.toFixed(0)} гПа`;
            document.getElementById('avg-clouds').textContent = `${data.average_cloud_cover.toFixed(1)}%`;

            // Обновляем карточки конкретных провайдеров
            providersGrid.innerHTML = '';
            data.raw_data.forEach(weather => {
                const card = document.createElement('div');
                card.className = 'bg-white p-6 rounded-2xl shadow-sm border border-slate-200 card';
                card.innerHTML = `
                    <h3 class="text-lg font-bold text-blue-600 mb-4 border-b pb-2">${weather.provider_name}</h3>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between"><span class="text-slate-500">Температура:</span> <span class="font-medium">${weather.temperature.toFixed(1)}°C</span></div>
                        <div class="flex justify-between"><span class="text-slate-500">Влажность:</span> <span class="font-medium">${weather.humidity}%</span></div>
                        <div class="flex justify-between"><span class="text-slate-500">Ветер:</span> <span class="font-medium">${weather.wind_speed.toFixed(1)} м/с</span></div>
                        <div class="flex justify-between"><span class="text-slate-500">Давление:</span> <span class="font-medium">${weather.pressure} гПа</span></div>
                        <div class="flex justify-between"><span class="text-slate-500">Облачность:</span> <span class="font-medium">${weather.cloud_cover}%</span></div>
                    </div>
                `;
                providersGrid.appendChild(card);
            });

            // Показываем интерфейс с данными
            statusMsg.classList.add('hidden');
            mainMetrics.classList.remove('hidden');
            providersSection.classList.remove('hidden');
            downloadBtn.classList.remove('hidden');
        }

        function downloadJSON() {
            if (!lastData) return;
            const blob = new Blob([JSON.stringify(lastData, null, 2)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'weather_report.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        getBtn.addEventListener('click', fetchWeather);
        downloadBtn.addEventListener('click', downloadJSON);
    </script>
</body>
</html>
